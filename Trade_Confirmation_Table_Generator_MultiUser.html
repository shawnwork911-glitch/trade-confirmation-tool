<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade Confirmation Table Generator</title>

<style>
body { font-family: Arial; padding:20px; }
.card { border:1px solid #ddd; padding:15px; margin-bottom:20px; }
.output-header { display:flex; justify-content:space-between; }
#preview-meta { font-size:12px; color:#666; }
table { border-collapse: collapse; width:100%; }
td { border:1px solid #333; padding:6px; }
.small { font-size:12px; color:#666; }
</style>
</head>

<body>

<div class="card">
  <h3>Agreement</h3>

  Deal ID:
  <input id="dealId" type="text"><br><br>

  Agreement Type:
  <select id="agreementType">
    <option value="Buyer">Buyer</option>
    <option value="Seller">Seller</option>
  </select><br><br>

  Counterparty:
  <input id="counterparty" type="text"><br><br>

  Delivery Start:
  <input id="startDate" type="date"><br><br>

  Delivery End:
  <input id="endDate" type="date"><br><br>

  Tech (e.g. SLR):
  <input id="tech" type="text"><br><br>

  Country (e.g. MY):
  <input id="country" type="text"><br><br>

  <button onclick="generate()">Generate</button>
</div>

<div id="output-section" class="card" style="display:none;">
  <div class="output-header">
    <div>
      <b>Preview</b>
      <div id="preview-meta"></div>
    </div>
    <button onclick="copyTable()">Copy</button>
  </div>

  <div id="table-preview"></div>
</div>

<script>

/* ===============================
   FULL HARDCODED MAPPING (FROM EXCEL)
================================= */

const COUNTRY_FULLNAME = {
  "MY": "Malaysia",
  "BN": "Brunei",
  "CN": "China",
  "JP": "Japan",
  "SA": "South Asia",
  "TH": "Thailand",
  "IN": "India",
  "PH": "Philipine",
  "SG": "Singapore",
  "VN": "Vietnam",
  "ID": "Indonesia",
  "AU": "Australia",
  "TW": "Taiwan"
};

const TECH_FULLNAME = {
  "SLR": "Solar",
  "ANY": "Any tech",
  "GEO": "Geothermal",
  "BIO": "Biomass",
  "HYD": "Hydro",
  "BGS": "Biogas",
  "SHY": "Small Hydro",
  "LHY": "Large Hydro",
  "CC": "Carbon Credit",
  "WND": "Wind",

  // Combined tech (important)
  "SLR/WND": "Solar/Wind",
  "SLR/BIO": "Solar/Biomass",
  "SLR/WND/SHY": "Solar/Wind/Small Hydro",
  "SLR/WND/LHY": "Solar/Wind/Large Hydro"
};

/* ===============================
   NORMALIZATION
================================= */

function normalize(val) {
  return val ? val.trim().toUpperCase() : "";
}

function getFullCountry(val) {
  const key = normalize(val);
  return COUNTRY_FULLNAME[key] || val;
}

function getFullTech(val) {
  const key = normalize(val);
  return TECH_FULLNAME[key] || val;
}

/* ===============================
   SAXON LOGIC
================================= */

function getSaxonSide(type) {
  if (type === "Buyer") return "Seller: Saxon";
  if (type === "Seller") return "Buyer: Saxon";
  return "";
}

/* ===============================
   PREVIEW META
================================= */

function updatePreviewMeta(data) {
  document.getElementById("preview-meta").innerHTML =
    `Deal ID: <b>${data.dealId || '-'}</b> | ${data.counterparty || ''}`;
}

/* ===============================
   GENERATE TABLE
================================= */

function generate() {

  const dealData = {
    dealId: document.getElementById("dealId").value,
    agreementType: document.getElementById("agreementType").value,
    counterparty: document.getElementById("counterparty").value,
    start: document.getElementById("startDate").value,
    end: document.getElementById("endDate").value,
    tech: document.getElementById("tech").value,
    country: document.getElementById("country").value
  };

  updatePreviewMeta(dealData);

  const saxonSide = getSaxonSide(dealData.agreementType);
  const delivery = `${dealData.start} - ${dealData.end}`;

  const fullTech = getFullTech(dealData.tech);
  const fullCountry = getFullCountry(dealData.country);

  const html = `
    <table>
      <tr>
        <td>Counterparty</td>
        <td>
          ${dealData.counterparty}
          <div class="small">${saxonSide}</div>
        </td>
      </tr>

      <tr>
        <td>Delivery</td>
        <td>${delivery}</td>
      </tr>

      <tr>
        <td>Technology</td>
        <td>${fullTech}</td>
      </tr>

      <tr>
        <td>Country</td>
        <td>${fullCountry}</td>
      </tr>
    </table>
  `;

  document.getElementById("table-preview").innerHTML = html;
  document.getElementById("output-section").style.display = "block";

  document.getElementById("output-section")
    .scrollIntoView({ behavior: "smooth" });
}

/* ===============================
   COPY FUNCTION
================================= */

function copyTable() {
  const range = document.createRange();
  range.selectNode(document.getElementById("table-preview"));
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand("copy");
  alert("Copied!");
}

</script>

</body>
</html>
