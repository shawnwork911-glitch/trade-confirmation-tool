<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade Confirmation System</title>
<script src="https://unpkg.com/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
<style>
body {font-family: Arial; background:#f5f5f5; padding:20px;}
.card {background:#fff; padding:20px; border-radius:10px; margin-bottom:20px;}
table {width:100%; border-collapse:collapse;}
td {border:1px solid #333; padding:6px;}
</style>
</head>
<body>

<h2>Trade Confirmation Generator</h2>

<div class="card">
<label>Deal ID</label>
<input type="text" id="dealId"><br><br>

<label>Agreement Role</label>
<select id="role">
<option>Buyer</option>
<option>Seller</option>
</select><br><br>

<label>Counterparty</label>
<input type="text" id="cp"><br><br>

<label>Delivery Start</label>
<input type="date" id="start"><br><br>

<label>Delivery End</label>
<input type="date" id="end"><br><br>

<label>Country</label>
<input type="text" id="country"><br><br>

<label>Tech</label>
<input type="text" id="tech"><br><br>

<button onclick="generate()">Generate</button>
</div>

<div class="card" id="output" style="display:none;">
<h3 id="previewTitle"></h3>
<div id="table"></div>
</div>

<script>
function formatDate(d){
  if(!d) return "";
  const date = new Date(d);
  return date.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}

function mapCountry(c){
  const map = {"MY":"Malaysia","SG":"Singapore"};
  return map[c] || c;
}

function mapTech(t){
  const map = {"SLR":"Solar","WND":"Wind"};
  return map[t] || t;
}

function generate(){
  const dealId = document.getElementById("dealId").value;
  const role = document.getElementById("role").value;
  const cp = document.getElementById("cp").value;
  const start = formatDate(document.getElementById("start").value);
  const end = formatDate(document.getElementById("end").value);
  const country = mapCountry(document.getElementById("country").value);
  const tech = mapTech(document.getElementById("tech").value);

  let saxonRow = "";
  if(role === "Buyer"){
    saxonRow = "<tr><td>Seller</td><td>Saxon</td></tr>";
  } else {
    saxonRow = "<tr><td>Buyer</td><td>Saxon</td></tr>";
  }

  document.getElementById("previewTitle").innerText = "Preview – Deal ID: " + dealId;

  document.getElementById("table").innerHTML = `
  <table>
    <tr><td>${role}</td><td>${cp}</td></tr>
    ${saxonRow}
    <tr><td>Delivery</td><td>${start} - ${end}</td></tr>
    <tr><td>Country</td><td>${country}</td></tr>
    <tr><td>Technology</td><td>${tech}</td></tr>
  </table>
  `;

  document.getElementById("output").style.display="block";
}
</script>

</body>
</html>
